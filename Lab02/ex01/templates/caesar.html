<!DOCTYPE html>
<html lang="en">
<head>
    <title>Caesar Cipher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
    <div class="container mt-4">
        <h2 class="text-center font-weight-bold mb-4">CAESAR CIPHER</h2>

        <!-- ENCRYPTION -->
        <h5 style="font-weight: bold; color: blue;">ENCRYPTION</h5>
        <hr>
        <form method="POST" action="/encrypt">
            <div class="form-group">
                <label>Plain text:</label>
                <input type="text" class="form-control" name="inputPlainText" placeholder="Input Plain Text" required autofocus/>
            </div>
            <div class="form-group">
                <label>Key:</label>
                <input type="text" class="form-control" name="inputKeyPlain" placeholder="Input Key (number)" pattern="-?[0-9]+" title="Please enter a number" required/>
            </div>
            <button type="submit" class="btn btn-primary">Encrypt</button>
        </form>

        {% if encrypt_result %}
        <div class="alert alert-info mt-3">{{ encrypt_result }}</div>
        {% endif %}

        <!-- DECRYPTION -->
        <h5 class="mt-4" style="font-weight: bold; color: blue;">DECRYPTION</h5>
        <hr>
        <form method="POST" action="/decrypt">
            <div class="form-group">
                <label>Cipher text:</label>
                <input type="text" class="form-control" name="inputCipherText" placeholder="Input Cipher Text" required/>
            </div>
            <div class="form-group">
                <label>Key:</label>
                <input type="text" class="form-control" name="inputKeyCipher" placeholder="Input Key (number)" pattern="-?[0-9]+" title="Please enter a number" required/>
            </div>
            <button type="submit" class="btn btn-success">Decrypt</button>
        </form>

        {% if decrypt_result %}
        <div class="alert alert-success mt-3">{{ decrypt_result }}</div>
        {% endif %}
    </div>
</body>
</html>
